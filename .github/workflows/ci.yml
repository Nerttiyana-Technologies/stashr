name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore -c Release

      # Linux runners have Docker (Linux containers) → run the full suite incl. Testcontainers.
      - name: Test — full incl. integration (Linux)
        if: runner.os == 'Linux'
        run: dotnet test --no-build -c Release --verbosity normal

      # Windows runners can't pull Linux images (postgres:16-alpine) → skip the Docker-backed
      # integration projects; still exercises the Win32 SecureMemory P/Invoke via the unit tests.
      - name: Test — unit only, no Docker (Windows)
        if: runner.os == 'Windows'
        run: >-
          dotnet test --no-build -c Release --verbosity normal
          --filter "FullyQualifiedName!~Stashr.Storage.Postgres.Tests&FullyQualifiedName!~Stashr.Engines.Database.Tests"

  supply-chain:
    name: dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      # Audit-readiness evidence (ADR-0014/0016): surface known-vulnerable packages.
      - name: Vulnerable package scan
        run: dotnet list package --vulnerable --include-transitive
